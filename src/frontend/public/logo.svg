<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 48" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Bot forearm (left, angular — robot/circuit identity) -->
  <rect x="2" y="21" width="12" height="8" rx="1.5"
        stroke="url(#g1)" stroke-width="2"
        fill="url(#g1)" fill-opacity="0.12"/>
  <!-- Circuit node dots on bot arm -->
  <circle cx="6"  cy="25" r="1.1" fill="url(#g1)"/>
  <circle cx="10" cy="25" r="1.1" fill="url(#g1)"/>
  <!-- Circuit trace lines -->
  <line x1="6"  y1="23" x2="6"  y2="27" stroke="url(#g1)" stroke-width="0.7" opacity="0.5"/>
  <line x1="10" y1="23" x2="10" y2="27" stroke="url(#g1)" stroke-width="0.7" opacity="0.5"/>

  <!-- Clasped hands (center, filled — the moment of connection) -->
  <rect x="11" y="14" width="20" height="22" rx="7" fill="url(#g1)"/>
  <!-- Knuckle separations top (interlocked fingers suggestion) -->
  <line x1="16" y1="14" x2="16" y2="18.5" stroke="#09090b" stroke-width="1.8" stroke-opacity="0.25"/>
  <line x1="21" y1="13" x2="21" y2="17.5" stroke="#09090b" stroke-width="1.8" stroke-opacity="0.25"/>
  <line x1="26" y1="14" x2="26" y2="18.5" stroke="#09090b" stroke-width="1.8" stroke-opacity="0.25"/>
  <!-- Center glow — the connection point -->
  <circle cx="21" cy="25" r="3" fill="#67e8f9" opacity="0.85"/>

  <!-- Human forearm (right, organic/rounded — human identity) -->
  <rect x="28" y="21" width="12" height="8" rx="4"
        stroke="url(#g1)" stroke-width="2"
        fill="url(#g1)" fill-opacity="0.12"/>

  <!-- Wordmark -->
  <text x="50" y="32"
        font-family="Inter, system-ui, sans-serif"
        font-weight="700"
        font-size="22"
        letter-spacing="-0.5"
        fill="url(#g2)">BotJobs</text>

  <!-- .ch suffix -->
  <text x="163" y="32"
        font-family="Inter, system-ui, sans-serif"
        font-weight="400"
        font-size="14"
        fill="#6b7280">.ch</text>
</svg>
