<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <defs>
    <linearGradient id="clawGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Claw icon: 3 fingers gripping downward -->
  <!-- Left finger -->
  <path d="M10 6 C10 6 8 12 9 20 C9.5 24 12 26 12 26 L14 26 C14 26 12 24 12 20 C11.5 13 13 7 13 7 Z"
        fill="url(#clawGrad)"/>
  <!-- Middle finger (tallest) -->
  <path d="M18 3 C18 3 16 11 17 21 C17.5 26 20 29 20 29 L22 29 C22 29 20 26 20 21 C19 11 21 4 21 4 Z"
        fill="url(#clawGrad)"/>
  <!-- Right finger -->
  <path d="M27 6 C27 6 25 13 26 20 C26.5 24 29 26 29 26 L31 26 C31 26 29 24 29 20 C28 13 30 7 30 7 Z"
        fill="url(#clawGrad)"/>
  <!-- Palm / connector -->
  <path d="M8 6 Q20 2 32 6 L30 9 Q20 5.5 10 9 Z"
        fill="url(#clawGrad)"/>
  <!-- Subtle glow dot -->
  <circle cx="20" cy="36" r="2.5" fill="#10b981" opacity="0.9"/>

  <!-- Wordmark -->
  <text x="42" y="32"
        font-family="Inter, system-ui, sans-serif"
        font-weight="700"
        font-size="22"
        letter-spacing="-0.5"
        fill="url(#textGrad)">BotJobs</text>

  <!-- .ch subtle suffix -->
  <text x="155" y="32"
        font-family="Inter, system-ui, sans-serif"
        font-weight="400"
        font-size="14"
        fill="#6b7280">.ch</text>
</svg>
